<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orange Finance</title>
  <meta name="description" content="Smart personal finance tracker – income, expenses, investments &amp; analytics." />
  <meta name="theme-color" content="#f97316" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="OrangeFin" />

  <!-- Favicon (served from public/) -->
  <link rel="icon" href="/favicon.ico" />

  <!-- Google Fonts: Poppins + Montserrat (needed for PDF/print) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!--
    Razorpay is intentionally NOT loaded here.
    It is lazy-loaded on demand in razorpay.js to avoid:
      - 'otp-credentials' unrecognized feature warning
      - 'web-share' unrecognized feature warning
      - Unnecessary network request on every page load
  -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
