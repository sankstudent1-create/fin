<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Orange Finance | Swinfosystems</title>
  <meta name="description"
    content="Smart personal finance tracker – income, expenses, investments &amp; analytics by Swinfosystems." />
  <meta name="theme-color" content="#f97316" />
  <meta name="color-scheme" content="light" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />

  <!-- iOS PWA Support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OrangeFin" />

  <!-- iOS Touch Icons (multiple sizes for all devices) -->
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/180/wallet.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="https://img.icons8.com/color/152/wallet.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/color/180/wallet.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="https://img.icons8.com/color/167/wallet.png" />

  <!-- iOS Splash Screens (orange theme) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

  <!-- Structured Data: FinancialService -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "Orange Finance",
      "alternateName": "Orange Finance by Swinfosystems",
      "url": "https://fin.swinfosystems.online/",
      "logo": "https://img.icons8.com/color/512/wallet.png",
      "description": "Smart personal finance tracker and investment calculator.",
      "applicationCategory": "FinanceApplication",
      "author": {
        "@type": "Organization",
        "name": "Swinfosystems"
      }
    }
  </script>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/color/32/wallet.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://img.icons8.com/color/16/wallet.png" />

  <!-- SEO / Social -->
  <meta property="og:title" content="Orange Finance – Smart Finance Tracker" />
  <meta property="og:description" content="Track income, expenses, investments & get AI-powered financial advice." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://img.icons8.com/color/512/wallet.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Orange Finance by Swinfosystems" />
  <meta name="twitter:description" content="Smart personal finance tracker with AI advisor." />
</head>

<body>
  <div id="root">
    <!-- Semantic Fallback for SEO (Pre-hydration) -->
    <!-- Visually hidden but accessible to crawlers and screen readers -->
    <header style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;">
      <h1>Welcome to Orange Finance</h1>
      <p>Your trusted partner for financial solutions by Swinfosystems.</p>
      <nav>
        <ul>
          <li>Dashboard</li>
          <li>Expense Reports</li>
          <li>Savings Analytics</li>
          <li>SIP Calculator</li>
        </ul>
      </nav>
    </header>

    <!-- Premium Self-Contained Loading State -->
    <main style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background-color: #fff7ed; font-family: 'Outfit', sans-serif; color:#f97316;">
      <h2 style="font-size: 2rem; font-weight: 800;">Orange Finance</h2>
      <p>Loading your financial insights...</p>
    </main>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
