<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orange Finance</title>
  <meta name="description" content="Smart personal finance tracker – income, expenses, investments & analytics." />
  <meta name="theme-color" content="#f97316" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="OrangeFin" />

  <!-- Favicon — use a simple orange emoji favicon via SVG data URI to avoid 404 -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23f97316'/><text y='.9em' font-size='72' x='12'>💰</text></svg>" />

  <!-- Google Fonts: Poppins + Montserrat (for print PDF) — use stylesheet not preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Razorpay — defer so it doesn't block render or trigger feature warnings -->
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
